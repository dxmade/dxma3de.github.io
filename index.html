<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Escrow iOS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f2f2f7; } /* Цвет фона iOS */
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .ios-button { transition: transform 0.1s ease; }
        .ios-button:active { transform: scale(0.96); }
    </style>
</head>
<body class="p-4">

    <div class="glass rounded-[28px] p-6 shadow-sm border border-white mb-6">
        <div class="flex items-center gap-4">
            <div class="w-16 h-16 bg-gray-300 rounded-full overflow-hidden border-2 border-blue-500">
                <img id="user-photo" src="https://via.placeholder.com/150" alt="Avatar">
            </div>
            <div>
                <h1 id="user-name" class="text-xl font-bold text-black">Загрузка...</h1>
                <p class="text-gray-500 text-sm">ID: <span id="user-id">0000</span></p>
                <div class="flex text-yellow-500 text-sm mt-1">⭐⭐⭐⭐⭐ <span class="text-gray-400 ml-1">(0 отзывов)</span></div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <button class="ios-button glass p-4 rounded-2xl flex flex-col items-center justify-center border border-white shadow-sm">
            <span class="text-3xl mb-1">🤝</span>
            <span class="font-semibold text-sm">Новая сделка</span>
        </button>
        <button class="ios-button glass p-4 rounded-2xl flex flex-col items-center justify-center border border-white shadow-sm">
            <span class="text-3xl mb-1">👥</span>
            <span class="font-semibold text-sm">Друзья</span>
        </button>
    </div>

    <div class="fixed bottom-6 left-4 right-4 glass rounded-[30px] p-4 flex justify-around border border-white shadow-lg">
        <button class="text-blue-500 text-xs flex flex-col items-center">🏠<br>Главная</button>
        <button class="text-gray-400 text-xs flex flex-col items-center">💼<br>Сделки</button>
        <button class="text-gray-400 text-xs flex flex-col items-center">⚙️<br>Настройки</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        // Получаем данные из Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('user-id').innerText = user.id;
            if (user.photo_url) {
                document.getElementById('user-photo').src = user.photo_url;
            }
        }

        // Кнопка вибрации (Haptic Feedback)
        document.querySelectorAll('.ios-button').forEach(btn => {
            btn.onclick = () => {
                tg.HapticFeedback.impactOccurred('medium');
            };
        });
    </script>
</body>
</html>

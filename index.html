<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DXSHOP iOS 26</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #f2f2f7; }
        body { font-family: -apple-system, system-ui; background: var(--ios-bg); color: #000; transition: all 0.3s ease; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.3); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ios-card { border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .ios-btn:active { transform: scale(0.92); transition: 0.1s; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 glass p-6 pb-4 rounded-b-[30px] mb-4">
        <h1 id="tab-title" class="text-3xl font-bold tracking-tight">Главная</h1>
    </div>

    <div id="home" class="tab-content active px-4">
        <div class="ios-card glass p-6 mb-6">
            <div class="flex items-center gap-4">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white text-2xl shadow-lg">DX</div>
                <div>
                    <h2 class="text-xl font-bold" id="user-name">User</h2>
                    <p class="text-gray-500 text-sm">Статус: <span class="text-green-500 font-medium">Verified</span></p>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 gap-4">
            <button onclick="sendAction('create_deal')" class="ios-btn ios-card bg-white p-6 flex items-center justify-between">
                <span class="text-lg font-semibold text-blue-600">📦 Новая сделка</span>
                <span class="text-gray-300">→</span>
            </button>
            <button onclick="sendAction('write_review')" class="ios-btn ios-card bg-white p-6 flex items-center justify-between">
                <span class="text-lg font-semibold text-purple-600">✍️ Оставить отзыв</span>
                <span class="text-gray-300">→</span>
            </button>
        </div>
    </div>

    <div id="deals" class="tab-content px-4">
        <div class="text-center py-20 text-gray-400">
            <p class="text-5xl mb-4">📂</p>
            <p>У вас пока нет активных сделок</p>
        </div>
    </div>

    <div id="profile" class="tab-content px-4">
        <div class="ios-card bg-white p-6 text-center">
            <div class="w-24 h-24 bg-gray-200 rounded-full mx-auto mb-4 border-4 border-blue-100 overflow-hidden">
                <img id="p-avatar" src="" alt="">
            </div>
            <h2 class="text-2xl font-bold" id="p-name">Name</h2>
            <div class="flex justify-center gap-1 my-2 text-yellow-400">⭐⭐⭐⭐⭐</div>
            <p class="text-gray-400 text-sm">ID: <span id="p-id">000</span></p>
        </div>
        <button onclick="sendAction('open_admin')" id="admin-p" class="hidden w-full mt-6 py-4 bg-black text-white rounded-2xl font-bold ios-btn">ADMIN PANEL ⚡️</button>
    </div>

    <div class="fixed bottom-6 left-4 right-4 h-20 glass rounded-[35px] flex items-center justify-around px-4 shadow-2xl">
        <button onclick="switchTab('home', 'Главная')" class="ios-btn flex flex-col items-center gap-1">
            <span class="text-2xl">🏠</span>
            <span class="text-[10px] font-medium">Главная</span>
        </button>
        <button onclick="switchTab('deals', 'Сделки')" class="ios-btn flex flex-col items-center gap-1">
            <span class="text-2xl">💼</span>
            <span class="text-[10px] font-medium">Сделки</span>
        </button>
        <button onclick="switchTab('profile', 'Профиль')" class="ios-btn flex flex-col items-center gap-1">
            <span class="text-2xl">👤</span>
            <span class="text-[10px] font-medium">Профиль</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.HapticFeedback.impactOccurred('light');

        function switchTab(tabId, title) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-title').innerText = title;
            tg.HapticFeedback.selectionChanged();
        }

        function sendAction(type) {
            tg.HapticFeedback.impactOccurred('medium');
            tg.sendData(JSON.stringify({ action: type, user_id: tg.initDataUnsafe.user?.id }));
        }

        // Заполнение данных
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('p-name').innerText = user.first_name;
            document.getElementById('p-id').innerText = user.id;
            if(user.id === 8166820778) document.getElementById('admin-p').classList.remove('hidden');
        }
    </script>
</body>
</html>
